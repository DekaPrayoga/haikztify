<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DB954;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f9440;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0ffe8;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- Sound wave bars (music equalizer style) -->
  <rect x="20" y="35" width="8" height="30" rx="4" fill="url(#wave)"/>
  <rect x="33" y="25" width="8" height="50" rx="4" fill="url(#wave)"/>
  <rect x="46" y="18" width="8" height="64" rx="4" fill="url(#wave)"/>
  <rect x="59" y="28" width="8" height="44" rx="4" fill="url(#wave)"/>
  <rect x="72" y="38" width="8" height="24" rx="4" fill="url(#wave)"/>
</svg>
